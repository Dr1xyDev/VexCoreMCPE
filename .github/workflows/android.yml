name: Build PHP 7.0.3 Android ARM64 para PocketMine

on:
  workflow_dispatch:

env:
  API: 21
  TARGET: aarch64-linux-android
  NDK_VERSION: r25c

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            autoconf \
            bison \
            re2c \
            pkg-config \
            wget \
            unzip \
            libtool \
            curl \
            git \
            ca-certificates \
            libssl-dev \
            libxml2-dev \
            libyaml-dev \
            sqlite3 \
            libsqlite3-dev

      - name: Download PHP 7.0.3
        run: |
          echo "Downloading PHP 7.0.3..."
          wget -q https://museum.php.net/php7/php-7.0.3.tar.gz
          tar -xf php-7.0.3.tar.gz

      - name: Download and setup Android NDK
        run: |
          echo "Downloading NDK ${{ env.NDK_VERSION }}..."
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip
          echo "NDK=$PWD/android-ndk-${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Verify toolchain
        run: |
          export NDK=$PWD/android-ndk-${{ env.NDK_VERSION }}
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          
          echo "✓ Toolchain ready"
          $TOOLCHAIN/bin/aarch64-linux-android${{ env.API }}-clang --version | head -3

      - name: Build dependencies for Android
        run: |
          export NDK=$PWD/android-ndk-${{ env.NDK_VERSION }}
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export SYSROOT=$TOOLCHAIN/sysroot
          
          export CC=$TOOLCHAIN/bin/aarch64-linux-android${{ env.API }}-clang
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android${{ env.API }}-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export LD=$TOOLCHAIN/bin/ld.lld
          
          export CFLAGS="-O2 -fPIC --sysroot=$SYSROOT -march=armv8-a"
          export CXXFLAGS="-O2 -fPIC --sysroot=$SYSROOT -march=armv8-a"
          export LDFLAGS="--sysroot=$SYSROOT"
          export CPPFLAGS="-I$SYSROOT/usr/include"
          
          # Crear directorio de prefijo
          PREFIX=$PWD/android-deps
          mkdir -p $PREFIX
          
          # ===== BUILD ZLIB =====
          echo "Building zlib..."
          wget -q https://github.com/madler/zlib/archive/refs/tags/v1.2.11.tar.gz
          tar -xf v1.2.11.tar.gz
          cd zlib-1.2.11
          CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS" ./configure --prefix=$PREFIX --static
          make -j4 && make install
          cd ..
          
          echo "✓ zlib built successfully"

      - name: Configure PHP 7.0.3 for Android
        run: |
          export NDK=$PWD/android-ndk-${{ env.NDK_VERSION }}
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export SYSROOT=$TOOLCHAIN/sysroot
          export PREFIX=$PWD/android-deps
          
          export CC=$TOOLCHAIN/bin/aarch64-linux-android${{ env.API }}-clang
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android${{ env.API }}-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          export LD=$TOOLCHAIN/bin/ld.lld
          export NM=$TOOLCHAIN/bin/llvm-nm
          
          export CFLAGS="-O2 -fPIC --sysroot=$SYSROOT -march=armv8-a"
          export CXXFLAGS="-O2 -fPIC --sysroot=$SYSROOT -march=armv8-a"
          export LDFLAGS="-L$PREFIX/lib -L$SYSROOT/usr/lib --sysroot=$SYSROOT -Wl,-rpath-link=$SYSROOT/lib"
          export CPPFLAGS="-I$PREFIX/include -I$SYSROOT/usr/include"
          export LIBS="-lc -lm -ldl -lpthread"
          
          # ===== CACHE VARIABLES PARA CROSS-COMPILE =====
          export ac_cv_func_memcmp_working=yes
          export ac_cv_func_strcoll_works=yes
          export ac_cv_func_strptime=yes
          export ac_cv_func_mmap=yes
          export ac_cv_func_munmap=yes
          export ac_cv_func_mprotect=yes
          export ac_cv_func_fstat=yes
          export ac_cv_func_stat=yes
          export ac_cv_func_lstat=yes
          export ac_cv_func_flock=yes
          export ac_cv_func_fcntl=yes
          export ac_cv_func_fork=yes
          export ac_cv_func_execve=yes
          export ac_cv_func_socket=yes
          export ac_cv_func_accept=yes
          export ac_cv_func_connect=yes
          export ac_cv_func_select=yes
          export ac_cv_func_poll=yes
          export ac_cv_func_getpid=yes
          export ac_cv_func_getuid=yes
          export ac_cv_func_kill=yes
          export ac_cv_func_sigaction=yes
          export ac_cv_func_dlopen=yes
          export ac_cv_func_malloc_0_nonnull=yes
          export ac_cv_func_realloc_0_nonnull=yes
          export ac_cv_sys_file_offset_bits=64
          export ac_cv_c_bigendian=no
          export ac_cv_c_compiler_gnu=yes
          export ac_cv_prog_cc_g=yes
          export lt_cv_deplibs_check_method=pass_all
          export lt_cv_prog_gnu_ld=yes
          
          cd php-7.0.3
          
          # Patch para evitar ejecutar tests en cross-compile
          sed -i 's/ac_fn_c_try_run /ac_fn_c_try_compile /g' configure || true
          
          echo "Configuring PHP 7.0.3..."
          ./configure \
            --build=x86_64-linux-gnu \
            --host=${{ env.TARGET }} \
            --target=${{ env.TARGET }} \
            --prefix=/data/local/tmp/php7 \
            \
            --enable-cli \
            --enable-cgi \
            --enable-fpm \
            \
            --enable-pthreads \
            --enable-sockets \
            --enable-curl \
            --enable-json \
            --enable-mbstring \
            --enable-calendar \
            --enable-ctype \
            --enable-hash \
            --enable-filter \
            --enable-pcntl \
            --enable-posix \
            --enable-bcmath \
            --enable-zip \
            --enable-ftp \
            --enable-phar \
            --enable-opcache \
            --enable-sqlite3 \
            --enable-mysqlnd \
            --with-mysqli=mysqlnd \
            --with-zlib=$PREFIX \
            --with-curl \
            --with-openssl \
            --with-pic \
            \
            --disable-cgi \
            --disable-session \
            --disable-fileinfo \
            --disable-libxml \
            --disable-xml \
            --disable-dom \
            --disable-simplexml \
            --disable-xmlreader \
            --disable-xmlwriter \
            --disable-pdo \
            --disable-pdo-sqlite \
            --disable-pdo-mysql \
            --disable-shared \
            --enable-static \
            --without-pear \
            --without-iconv \
            2>&1 | tee configure.log
          
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Configure failed!"
            tail -100 configure.log
            exit 1
          fi

      - name: Build PHP
        run: |
          cd php-7.0.3
          echo "Building PHP..."
          make -j4 2>&1 | tee make.log
          
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Build failed!"
            tail -150 make.log
            exit 1
          fi
          
          echo "✓ Build completed successfully"

      - name: Install PHP
        run: |
          cd php-7.0.3
          echo "Installing PHP..."
          make install DESTDIR=$PWD/output
          
          mkdir -p output/data/local/tmp/php7/bin
          
          echo "✓ Installation complete"
          find output -type f -name "php*" | head -10

      - name: Verify extensions
        run: |
          if [ -f "php-7.0.3/output/data/local/tmp/php7/bin/php" ]; then
            echo "✓ PHP binary found"
            echo ""
            echo "=== Binary Info ==="
            file php-7.0.3/output/data/local/tmp/php7/bin/php
            ls -lh php-7.0.3/output/data/local/tmp/php7/bin/php
          else
            echo "✗ PHP binary NOT found!"
            find php-7.0.3/output -type f -executable
            exit 1
          fi

      - name: Strip binary
        run: |
          export NDK=$PWD/android-ndk-${{ env.NDK_VERSION }}
          
          if [ -f "php-7.0.3/output/data/local/tmp/php7/bin/php" ]; then
            echo "Stripping binary..."
            $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
              php-7.0.3/output/data/local/tmp/php7/bin/php
            
            ls -lh php-7.0.3/output/data/local/tmp/php7/bin/php
            echo "✓ Binary stripped successfully"
          fi

      - name: Create release artifact
        run: |
          cd php-7.0.3/output
          tar -czf ../php-7.0.3-android-arm64-pocketmine.tar.gz *
          cd ..
          ls -lh php-7.0.3-android-arm64-pocketmine.tar.gz
          
          echo "Artifact size:"
          du -sh php-7.0.3-android-arm64-pocketmine.tar.gz

      - name: Upload artifact (folder structure)
        uses: actions/upload-artifact@v4
        with:
          name: php-7.0.3-android-arm64-pocketmine
          path: php-7.0.3/output/
          retention-days: 30

      - name: Upload artifact (tarball)
        uses: actions/upload-artifact@v4
        with:
          name: php-7.0.3-android-arm64-pocketmine-tarball
          path: php-7.0.3/php-7.0.3-android-arm64-pocketmine.tar.gz
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            php-7.0.3/configure.log
            php-7.0.3/make.log
            php-7.0.3/config.log
          retention-days: 7

      - name: Create summary
        if: success()
        run: |
          echo "## ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### PHP 7.0.3 for Android ARM64 (PocketMine-MP)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Extensions Compiled:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ pthreads (required)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ sockets (required)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ curl (required)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ json" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ sqlite3 (required)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ zlib (required)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ mbstring" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ hash" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ pcntl" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ posix" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ bcmath" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ opcache" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo "- Folder structure: `php-7.0.3-android-arm64-pocketmine`" >> $GITHUB_STEP_SUMMARY
          echo "- Tarball: `php-7.0.3-android-arm64-pocketmine-tarball`" >> $GITHUB_STEP_SUMMARY
