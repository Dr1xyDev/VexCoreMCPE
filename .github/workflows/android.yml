name: Build PHP 7.0.3 Android ARM64 FULL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      API: 21
      TARGET: aarch64-linux-android

    steps:
      - uses: actions/checkout@v4

      - name: Install host deps
        run: |
          sudo apt update
          sudo apt install -y build-essential autoconf bison re2c \
          pkg-config wget unzip libtool curl git ca-certificates

      - name: Download PHP 7.0.3
        run: |
          wget https://museum.php.net/php7/php-7.0.3.tar.gz
          tar -xf php-7.0.3.tar.gz

      - name: Install Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "NDK=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Verify NDK
        run: |
          export NDK=$PWD/android-ndk-r25c
          echo "NDK location: $NDK"
          ls -la "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/" | grep aarch64-linux-android21
          echo "---"
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" --version

      - name: Configure PHP
        run: |
          export NDK=$PWD/android-ndk-r25c
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export SYSROOT=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          
          export CC=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android21-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          export LD=$TOOLCHAIN/bin/ld.lld
          export NM=$TOOLCHAIN/bin/llvm-nm
          export OBJDUMP=$TOOLCHAIN/bin/llvm-objdump

          # ============ COMPILADOR FUNCIONA CON ESTOS FLAGS ============
          export CFLAGS="-fPIC -O2 --sysroot=$SYSROOT -march=armv8-a -mtune=cortex-a53"
          export CXXFLAGS="-fPIC -O2 --sysroot=$SYSROOT -march=armv8-a -mtune=cortex-a53"
          export LDFLAGS="--sysroot=$SYSROOT -Wl,-rpath-link=$SYSROOT/lib -Wl,-rpath-link=$SYSROOT/usr/lib"
          export LIBS="-lc -lm -ldl -lpthread"

          # ============ CACHE Y VARIABLES DE CROSS-COMPILE ============
          export ac_cv_func_mmap_fixed_mapping=yes
          export ac_cv_func_mmap_anon=yes
          export ac_cv_func_mmap=yes
          export ac_cv_func_munmap=yes
          export ac_cv_func_mprotect=yes
          export ac_cv_func_fstat=yes
          export ac_cv_func_stat=yes
          export ac_cv_func_lstat=yes
          export ac_cv_func_flock=yes
          export ac_cv_func_fcntl=yes
          export ac_cv_func_lockf=yes
          
          # Memory allocation
          export ac_cv_func_malloc=yes
          export ac_cv_func_realloc=yes
          export ac_cv_func_calloc=yes
          export ac_cv_func_free=yes
          export ac_cv_func_malloc_0_nonnull=yes
          export ac_cv_func_realloc_0_nonnull=yes
          export ac_cv_func_calloc_0_nonnull=yes
          
          # Shared memory (deshabilitar)
          export ac_cv_func_shm_open=no
          export ac_cv_func_shmget=no
          export ac_cv_func_shmat=no
          export ac_cv_func_shmdt=no
          export ac_cv_func_shmctl=no
          export php_cv_mmap_shared_memory=yes
          
          # Paths y endianness
          export ac_cv_sys_file_offset_bits=64
          export ac_cv_c_bigendian=no
          export ac_cv_c_char_unsigned=no
          export ac_cv_sizeof_size_t=8
          export ac_cv_sizeof_ptrdiff_t=8
          
          # POSIX
          export ac_cv_func_getcwd=yes
          export ac_cv_func_gethostname=yes
          export ac_cv_func_getuid=yes
          export ac_cv_func_getgid=yes
          export ac_cv_func_getpid=yes
          export ac_cv_func_getppid=yes
          export ac_cv_func_fork=yes
          export ac_cv_func_execve=yes
          export ac_cv_func_pipe=yes
          export ac_cv_func_socket=yes
          export ac_cv_func_socketpair=yes
          export ac_cv_func_accept=yes
          export ac_cv_func_listen=yes
          export ac_cv_func_bind=yes
          export ac_cv_func_connect=yes
          export ac_cv_func_select=yes
          export ac_cv_func_poll=yes
          
          # Signals
          export ac_cv_func_kill=yes
          export ac_cv_func_sigaction=yes
          export ac_cv_func_signal=yes
          export ac_cv_func_sigprocmask=yes
          
          # Otros
          export php_cv_cc_rpath=no
          export lt_cv_deplibs_check_method=pass_all
          export lt_cv_prog_gnu_ld=yes
          export php_cv_have_broken_getcwd=no
          export ac_cv_func_strcoll_works=yes
          export ac_cv_func_strptime=yes
          export ac_cv_func_dlopen=yes
          export ac_cv_c_compiler_gnu=yes
          
          cd php-7.0.3

          ./configure \
          --build=x86_64-linux-gnu \
          --host=aarch64-linux-android \
          --target=aarch64-linux-android \
          --prefix=/data/local/tmp/php7 \
          --with-sysroot=$SYSROOT \
          --enable-cli \
          --enable-maintainer-zts \
          --enable-pthreads \
          --enable-mbstring \
          --enable-calendar \
          --enable-ctype \
          --enable-sockets \
          --enable-shmop \
          --disable-sysvsem \
          --disable-sysvshm \
          --disable-sysvmsg \
          --enable-pcntl \
          --enable-bcmath \
          --enable-zip \
          --enable-ftp \
          --enable-phar \
          --enable-opcache \
          --enable-weakref \
          --enable-mysqlnd \
          --with-mysqli=mysqlnd \
          --with-zlib \
          --with-pic \
          --disable-cgi \
          --disable-session \
          --disable-fileinfo \
          --disable-libxml \
          --disable-xml \
          --disable-dom \
          --disable-simplexml \
          --disable-xmlreader \
          --disable-xmlwriter \
          --disable-pdo \
          --disable-fpm \
          --disable-shared \
          --enable-static \
          --without-pear \
          --without-iconv \
          --without-sqlite3

      - name: Check config
        run: |
          cd php-7.0.3
          echo "=== Config status ==="
          head -50 config.log | grep -E "(error|failed|cannot)" || echo "No errors in first 50 lines"
          echo ""
          echo "=== Compiler test ==="
          tail -100 config.log | grep -A5 "C compiler"

      - name: Build
        run: |
          cd php-7.0.3
          make -j4 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            tail -200 build.log
            exit 1
          fi

      - name: Install
        run: |
          cd php-7.0.3
          make install DESTDIR=$PWD/output
          mkdir -p output/data/local/tmp/php7/bin

      - name: List output
        run: |
          echo "=== Build output structure ==="
          find php-7.0.3/output -type f | head -20
          echo ""
          echo "=== Looking for PHP binary ==="
          find php-7.0.3/output -name "php" -type f

      - name: Strip binary
        if: success()
        run: |
          export NDK=$PWD/android-ndk-r25c
          if [ -f "php-7.0.3/output/data/local/tmp/php7/bin/php" ]; then
            $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
            php-7.0.3/output/data/local/tmp/php7/bin/php || true
            echo "✅ Binary stripped successfully"
          else
            echo "⚠️ PHP binary not found"
          fi

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: php-7.0.3-android-arm64
          path: php-7.0.3/output
          retention-days: 30

      - name: Upload config.log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: config-log
          path: php-7.0.3/config.log
          retention-days: 7

      - name: Upload build.log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: php-7.0.3/build.log
          retention-days: 7
